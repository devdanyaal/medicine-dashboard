<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Medicine Reminder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 30px 20px 20px;
    }

    .header h1 {
      color: #00d4aa;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      color: #8b949e;
      font-size: 14px;
    }

    .time-display {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: #e6edf3;
      margin: 10px 0 24px;
      letter-spacing: 2px;
    }

    .status-bar {
      text-align: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .online  { color: #2ed573; }
    .offline { color: #ff4757; }
    .loading { color: #f77f00; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.3s;
    }

    .card.taken  { border-color: #2ed573; }
    .card.missed { border-color: #ff4757; }
    .card.alarm  { border-color: #ffa502; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { border-color: #ffa502; }
      50%       { border-color: #ff6b00; }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .slot-name {
      font-size: 20px;
      font-weight: bold;
    }

    .slot-time {
      font-size: 13px;
      color: #8b949e;
      background: #0d1117;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      margin-top: 4px;
    }

    .badge-taken   { background: #1a3a2a; color: #2ed573; }
    .badge-missed  { background: #3a1a1a; color: #ff4757; }
    .badge-pending { background: #2a2a1a; color: #f77f00; }
    .badge-alarm   { background: #3a2a0a; color: #ffa502; }

    .updated-time {
      font-size: 11px;
      color: #8b949e;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      color: #8b949e;
      font-size: 12px;
    }

    .refresh-btn {
      background: #00d4aa;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .refresh-btn:hover { background: #00b894; }

    .summary {
      max-width: 960px;
      margin: 0 auto 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .summary-item span {
      display: block;
      font-size: 28px;
      font-weight: bold;
    }

    .summary-item p {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }

    .s-taken   { color: #2ed573; }
    .s-missed  { color: #ff4757; }
    .s-pending { color: #f77f00; }
  </style>
</head>
<body>

<div class="header">
  <h1>Smart Medicine Reminder</h1>
  <p>Real-time monitoring dashboard</p>
</div>

<div class="time-display" id="clock">--:--:--</div>

<div class="status-bar">
  Firebase: <span id="fb-status" class="loading">Connecting...</span>
  &nbsp;|&nbsp; Last updated: <span id="last-update">--</span>
</div>

<div class="summary" id="summary">
  <div class="summary-item">
    <span class="s-taken"  id="count-taken">-</span>
    <p>Taken</p>
  </div>
  <div class="summary-item">
    <span class="s-missed" id="count-missed">-</span>
    <p>Missed</p>
  </div>
  <div class="summary-item">
    <span class="s-pending" id="count-pending">-</span>
    <p>Pending</p>
  </div>
</div>

<div class="grid" id="cards">
  <!-- Cards injected by JS -->
</div>

<button class="refresh-btn" onclick="fetchData()">Refresh Now</button>

<div class="footer">
  <p>Auto-refreshes every 10 seconds &nbsp;|&nbsp; Data stored in Firebase Realtime Database</p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ---- YOUR FIREBASE CONFIG ----
  // Get this from: Firebase Console → Project Settings → Your apps → Config
  const firebaseConfig = {
    apiKey:            "AIzaSyBBaGE7fUs18zB0z3zAGunUYrlQKU7bW48",
    authDomain:        "smart-medicine-reminder-2c7e1.firebaseapp.com",
    databaseURL:       "https://smart-medicine-reminder-2c7e1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "smart-medicine-reminder-2c7e1",
    storageBucket:     "smart-medicine-reminder-2c7e1.firebasestorage.app",
    messagingSenderId: "84854189858",
    appId:             "1:84854189858:web:c137f7590c9e15fe1b7f7b"
  };
  // --------------------------------

  const SLOTS = [
    { key: "Morning", time: "8:00 AM"  },
    { key: "Noon",    time: "1:00 PM"  },
    { key: "Night",   time: "9:00 PM"  }
  ];

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Live clock
  setInterval(() => {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString("en-IN", { hour12: false });
  }, 1000);

  // Listen for real-time Firebase updates
  const medicineRef = ref(db, "medicine");
  onValue(medicineRef, (snapshot) => {
    const data = snapshot.val();

    document.getElementById("fb-status").textContent = "Connected ✅";
    document.getElementById("fb-status").className = "online";
    document.getElementById("last-update").textContent = new Date().toLocaleTimeString();

    let taken = 0, missed = 0, pending = 0;
    const cardsHTML = SLOTS.map(slot => {
      const info   = data?.[slot.key] || {};
      const status = (info.status || "PENDING").toUpperCase();
      const time   = info.time   || "--";

      if      (status === "TAKEN")   taken++;
      else if (status === "MISSED")  missed++;
      else                           pending++;

      let badgeClass, badgeText, cardClass;
      if (status === "TAKEN") {
        badgeClass = "badge-taken";   badgeText = "✅ TAKEN";   cardClass = "taken";
      } else if (status === "MISSED") {
        badgeClass = "badge-missed";  badgeText = "❌ MISSED";  cardClass = "missed";
      } else if (status === "RINGING") {
        badgeClass = "badge-alarm";   badgeText = "🔔 RINGING"; cardClass = "alarm";
      } else {
        badgeClass = "badge-pending"; badgeText = "⏳ PENDING"; cardClass = "";
      }

      return `
        <div class="card ${cardClass}">
          <div class="card-header">
            <span class="slot-name">${slot.key}</span>
            <span class="slot-time">${slot.time}</span>
          </div>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
          <p class="updated-time">Last updated: ${time}</p>
        </div>`;
    }).join("");

    document.getElementById("cards").innerHTML = cardsHTML;
    document.getElementById("count-taken").textContent   = taken;
    document.getElementById("count-missed").textContent  = missed;
    document.getElementById("count-pending").textContent = pending;

  }, (error) => {
    document.getElementById("fb-status").textContent = "Error: " + error.message;
    document.getElementById("fb-status").className = "offline";
  });

  // Expose refresh for button
  window.fetchData = () => location.reload();
</script>

</body>
</html>
